blank_issues_enabled: false
contact_links:
  - name: Question or usage help
    url: https://github.com/ZethicTech/react-native-update-gate/discussions
    about: |
      For "how do I…" questions, please use Discussions instead of Issues.
      Issues should describe bugs or feature requests with reproducible details.
  - name: Security vulnerability
    url: https://github.com/ZethicTech/react-native-update-gate/security/advisories/new
    about: |
      Report security issues privately via GitHub Security Advisory.
      Please do NOT open a public issue for vulnerabilities.
