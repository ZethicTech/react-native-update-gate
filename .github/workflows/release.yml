name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Pauses at the publish step until a designated reviewer approves on GitHub.
    # Configure reviewers + tag-pattern restriction at:
    # https://github.com/ZethicTech/react-native-update-gate/settings/environments
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@zethictech/react-native-update-gate
    permissions:
      contents: read
      # id-token: write is the magic — lets GitHub Actions mint an OIDC token
      # that npm exchanges for short-lived publish credentials. No NPM_TOKEN.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11 natively (Trusted Publishing supported).
          # Avoids the `npm install -g npm` self-bootstrap bug seen on runners.
          node-version: '24'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'

      - name: Confirm npm version
        run: npm --version

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Run tests
        run: yarn test --ci

      - name: Build
        run: yarn build

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --access public --provenance
